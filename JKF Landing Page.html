document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a5197e1a-dcf2-427b-8778-a9bce9aeac53\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n:root {\n  --bg: #f0f4f9;\n  --bg1: #e8eef6;\n  --bg2: #dde5f0;\n  --blue: #0077bb;\n  --blue-dim: rgba(0,119,187,0.1);\n  --blue-glow: rgba(0,119,187,0.05);\n  --border: rgba(0,80,160,0.12);\n  --text-1: #0a1628;\n  --text-2: rgba(10,22,40,0.58);\n  --text-3: rgba(10,22,40,0.32);\n  --font: 'Space Grotesk', sans-serif;\n  --mono: 'JetBrains Mono', monospace;\n}\n\nhtml { scroll-behavior: smooth; }\nbody { font-family: var(--font); background: var(--bg); color: var(--text-1); overflow-x: hidden; }\n::-webkit-scrollbar { width: 4px; }\n::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; opacity: 0.4; }\n\n/* ─── ANIMATIONS ─── */\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(28px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n@keyframes scanline {\n  from { transform: translateY(-100%); }\n  to   { transform: translateY(120vh); }\n}\n@keyframes pulse {\n  0%,100% { opacity: 0.5; transform: scale(1); }\n  50%      { opacity: 0.15; transform: scale(1.08); }\n}\n@keyframes float {\n  0%,100% { transform: translateY(0); }\n  50%      { transform: translateY(-10px); }\n}\n@keyframes gridScroll {\n  from { background-position: 0 0; }\n  to   { background-position: 0 60px; }\n}\n@keyframes borderGlow {\n  0%,100% { box-shadow: 0 0 12px rgba(0,149,213,0.2); }\n  50%      { box-shadow: 0 0 28px rgba(0,149,213,0.5); }\n}\n@keyframes countUp { from { opacity: 0; } to { opacity: 1; } }\n@keyframes spin { to { transform: rotate(360deg); } }\n\n.reveal { opacity: 0; transform: translateY(32px); on>\n\n<!-- ─── CONTACT ─── -->\n<section id=\"contact\" style=\"border-top:1px solid var(--border)\">\n  <div class=\"section-inner\">\n    <div class=\"contact-grid\">\n      <div class=\"reveal\">\n        <div class=\"section-label\">Contact<\u002Fdiv>\n        <h2 class=\"section-title\">프로젝트<br>사양 문의<\u002Fh2>\n        <p class=\"section-sub\" style=\"margin-top:16px\">\n          무기체계 및 우주항공 프로젝트의 사양·견적 요청.\n          전문 엔지니어링 팀이 직접 검토하고 빠르게 응답합니다.\n        <\u002Fp>\n        <div style=\"margin-top:32px;display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--blue)\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 10.5 19.36 19.36 0 0 1 1.64 2.11 2 2 0 0 1 3.62.01H6.7a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:13px;color:var(--text-2)\">방산 전문 상담 직통 연결<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--blue)\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12,6 12,12 16,14\"><\u002Fpolyline><\u002Fsvg>\n            <span style=\"font-size:13px;color:var(--text-2)\">영업일 기준 24시간 내 회신<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--blue)\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14,2 14,8 20,8\"><\u002Fpolyline><\u002Fsvg>\n            <span style=\"font-size:13px;color:var(--text-2)\">규격서·도면 첨부 문의 가능<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal reveal-delay-2\">\n        <form onsubmit=\"handleSubmit(event)\">\n          <div class=\"form-group\">\n            <label class=\"form-label\">이름 (Name)<\u002Flabel>\n            <input type=\"text\" class=\"form-input\" placeholder=\"홍길동\">\n          <\u002Fdiv>\n          <div class=\"form-group\">\n            <label class=\"form-label\">회사/소속 (Company)<\u002Flabel>\n            <input type=\"text\" class=\"form-input\" placeholder=\"(주) 방산업체\">\n          <\u002Fdiv>\n          <div class=\"form-group\">\n            <label class=\"form-label\">이메일 (Email)<\u002Flabel>\n            <input type=\"email\" class=\"form-input\" placeholder=\"contact@company.com\">\n          <\u002Fdiv>\n          <div class=\"form-group\">\n            <label class=\"form-label\">문의 내용 (Request Details)<\u002Flabel>\n            <textarea class=\"form-input\" placeholder=\"프로젝트 규격, 수량, 납기 등을 자유롭게 입력해 주세요.\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <button type=\"submit\" class=\"form-submit\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"><\u002Fline><polygon points=\"22,2 15,22 11,13 2,9 22,2\"><\u002Fpolygon><\u002Fsvg>\n            Send Request — 문의 보내기\n          <\u002Fbutton>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── FOOTER ─── -->\n<footer>\n  <div class=\"footer-inner\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <img src=\"65abb38c-a16d-4700-b29f-59f53dfe468c\" alt=\"JUNGKUM FASTENER\" style=\"height:24px;width:auto;object-fit:contain;\">\n      <div>\n        <div style=\"font-size:11px;font-weight:700;color:var(--text-2)\">DEFENCE Business<\u002Fdiv>\n        <div class=\"footer-copy\" style=\"margin-top:2px\">© 2026 JUNGKUM Fastener Industrial Co., Ltd. All Rights Reserved.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-links\">\n      <a href=\"http://www.jungkum.com\" target=\"_blank\">공식 홈페이지<\u002Fa>\n      <a href=\"#\">이용약관<\u002Fa>\n      <a href=\"#\">개인정보처리방침<\u002Fa>\n      <a href=\"#contact\">문의<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// ─── SCROLL REVEAL ───\nconst observer = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });\n}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });\ndocument.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n// ─── COUNTER ───\nconst counters = document.querySelectorAll('.stat-value[data-target]');\nconst counterObserver = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if (!e.isIntersecting) return;\n    const el = e.target;\n    const target = parseInt(el.dataset.target);\n    const duration = 1600;\n    const start = performance.now();\n    const update = (now) => {\n      const progress = Math.min((now - start) / duration, 1);\n      const ease = 1 - Math.pow(1 - progress, 3);\n      el.textContent = Math.round(ease * target);\n      if (progress < 1) requestAnimationFrame(update);\n    };\n    requestAnimationFrame(update);\n    counterObserver.unobserve(el);\n  });\n}, { threshold: 0.5 });\ncounters.forEach(c => counterObserver.observe(c));\n\n// ─── NAV SCROLL ───\nwindow.addEventListener('scroll', () => {\n  document.getElementById('nav').style.background =\n    window.scrollY > 20 ? 'rgba(255,255,255,0.97)' : 'rgba(255,255,255,0.92)';\n});\n\n// ─── FORM ───\nfunction handleSubmit(e) {\n  e.preventDefault();\n  const btn = e.target.querySelector('.form-submit');\n  btn.textContent = '✓ 전송 완료 — 빠른 시일 내 회신드리겠습니다';\n  btn.style.background = '#047857';\n  btn.disabled = true;\n}\n<\u002Fscript>\n\n<script type=\"importmap\">\n{\n  \"imports\": {\n    \"three\": \"https://unpkg.com/three@0.160.0/build/three.module.js\",\n    \"three/addons/\": \"https://unpkg.com/three@0.160.0/examples/jsm/\"\n  }\n}\n<\u002Fscript>\n\n<script type=\"module\">\nimport * as THREE from 'three';\nimport { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';\nimport { OrbitControls } from 'three/addons/controls/OrbitControls.js';\n\nconst canvas = document.getElementById('hero3d');\nconst loading = document.getElementById('hero3d-loading');\nif (!canvas) throw new Error('canvas not found');\n\n// Renderer\nconst renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });\nrenderer.setPixelRatio(window.devicePixelRatio);\nrenderer.outputColorSpace = THREE.SRGBColorSpace;\nrenderer.toneMapping = THREE.ACESFilmicToneMapping;\nrenderer.toneMappingExposure = 1.9;\n\n// Scene & Camera\nconst scene = new THREE.Scene();\nconst camera = new THREE.PerspectiveCamera(40, 1, 0.01, 100);\ncamera.position.set(0, 2.5, 5.5);\n\n// Controls\nconst controls = new OrbitControls(camera, canvas);\ncontrols.enablePan = false;\ncontrols.enableZoom = true;\ncontrols.autoRotate = true;\ncontrols.autoRotateSpeed = 2.5;\ncontrols.minDistance = 1.5;\ncontrols.maxDistance = 8;\ncontrols.target.set(0, -0.5, 0);\n\n// Lighting\nconst ambient = new THREE.AmbientLight(0xffffff, 1.1);\nscene.add(ambient);\n\nconst key = new THREE.DirectionalLight(0xffffff, 3.2);\nkey.position.set(3, 5, 3);\nscene.add(key);\n\nconst fill = new THREE.DirectionalLight(0xcce8ff, 1.5);\nfill.position.set(-3, 0, 2);\nscene.add(fill);\n\nconst rim = new THREE.DirectionalLight(0x0095d5, 0.8);\nrim.position.set(0, -3, -3);\nscene.add(rim);\n\n// Resize\nfunction resize() {\n  const w = canvas.parentElement.clientWidth;\n  const h = canvas.parentElement.clientHeight;\n  renderer.setSize(w, h, false);\n  camera.aspect = w / h;\n  camera.updateProjectionMatrix();\n}\nresize();\nnew ResizeObserver(resize).observe(canvas.parentElement);\n\n// Load GLB\nconst loader = new GLTFLoader();\nloader.load(\n  'uploads/KSB1023-PA-M3x10-A2-70.glb',\n  (gltf) => {\n    const model = gltf.scene;\n    // Center & scale\n    const box = new THREE.Box3().setFromObject(model);\n    const center = box.getCenter(new THREE.Vector3());\n    const size = box.getSize(new THREE.Vector3());\n    const maxDim = Math.max(size.x, size.y, size.z);\n    const scale = 1.6 / maxDim;\n    model.position.sub(center.multiplyScalar(scale));\n    model.position.y -= 0.3;\n    model.scale.setScalar(scale);\n    scene.add(model);\n    loading.style.display = 'none';\n  },\n  (xhr) => {\n    const pct = Math.round(xhr.loaded / xhr.total * 100);\n    const span = loading.querySelector('span');\n    if (span) span.textContent = `LOADING MODEL... ${pct}%`;\n  },\n  (err) => {\n    console.error('GLB load error:', err);\n    loading.querySelector('span').textContent = 'MODEL UNAVAILABLE';\n  }\n);\n\n// Animate\nfunction animate() {\n  requestAnimationFrame(animate);\n  controls.update();\n  renderer.render(scene, camera);\n}\nanimate();\n\n// ─── CATALOG 3D VIEWER ───\n(function() {\n  const canvas2 = document.getElementById('catalog3d');\n  const loading2 = document.getElementById('catalog3d-loading');\n  if (!canvas2) return;\n\n  const renderer2 = new THREE.WebGLRenderer({ canvas: canvas2, antialias: true, alpha: true });\n  renderer2.setPixelRatio(window.devicePixelRatio);\n  renderer2.outputColorSpace = THREE.SRGBColorSpace;\n  renderer2.toneMapping = THREE.ACESFilmicToneMapping;\n  renderer2.toneMappingExposure = 1.9;\n\n  const scene2 = new THREE.Scene();\n  const camera2 = new THREE.PerspectiveCamera(40, 1, 0.01, 100);\n  camera2.position.set(0, 2, 5);\n\n  const controls2 = new OrbitControls(camera2, canvas2);\n  controls2.enablePan = false;\n  controls2.enableZoom = true;\n  controls2.autoRotate = true;\n  controls2.autoRotateSpeed = 2.5;\n  controls2.minDistance = 1.5;\n  controls2.maxDistance = 8;\n  controls2.target.set(0, -0.3, 0);\n  controls2.update();\n\n  scene2.add(new THREE.AmbientLight(0xffffff, 1.1));\n  const key2 = new THREE.DirectionalLight(0xffffff, 3.2);\n  key2.position.set(3, 5, 3); scene2.add(key2);\n  const fill2 = new THREE.DirectionalLight(0xcce8ff, 1.5);\n  fill2.position.set(-3, 0, 2); scene2.add(fill2);\n\n  function resize2() {\n    const w = canvas2.parentElement.clientWidth;\n    const h = canvas2.parentElement.clientHeight;\n    renderer2.setSize(w, h, false);\n    camera2.aspect = w / h;\n    camera2.updateProjectionMatrix();\n  }\n  resize2();\n  new ResizeObserver(resize2).observe(canvas2.parentElement);\n\n  new GLTFLoader().load(\n    'uploads/KSB1023-PA-M3x10-A2-70-113e42c0.glb',\n    (gltf) => {\n      const model = gltf.scene;\n      const box = new THREE.Box3().setFromObject(model);\n      const center = box.getCenter(new THREE.Vector3());\n      const size = box.getSize(new THREE.Vector3());\n      const scale = 1.6 / Math.max(size.x, size.y, size.z);\n      model.position.sub(center.multiplyScalar(scale));\n      model.position.y -= 0.2;\n      model.scale.setScalar(scale);\n      scene2.add(model);\n      if (loading2) loading2.style.display = 'none';\n    },\n    null,\n    (err) => {\n      console.error('catalog GLB error', err);\n      if (loading2) loading2.querySelector('span').textContent = 'MODEL UNAVAILABLE';\n    }\n  );\n\n  (function animate2() {\n    requestAnimationFrame(animate2);\n    controls2.update();\n    renderer2.render(scene2, camera2);\n  })();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
